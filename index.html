<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator with History</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}
body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f4f4f4;
    gap:30px;
    background-image: url(cal.jpg);
}
#floatingText{
    position:absolute;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    font-size:36px;
    font-weight:bold;
    color:white;
}
.calculator{
    background:#222;
    padding:20px;
    border-radius:15px;
    width:320px;
}
.calculator{
    background: rgba(34, 34, 34, 0.5);
    padding: 20px;
    border-radius: 15px;
}
#display{
    width:100%;
    height:60px;
    border:none;
    border-radius:8px;
    margin-bottom:15px;
    text-align:right;
    font-size:28px;
    padding:10px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:8px;
    font-size:22px;
    cursor:pointer;
}

button:hover{
    opacity:0.8;
}

.number{
    background:#e0e0e0;
}

.operator{
    background:#ff9500;
    color:white;
}

.clear{
    background:#ff3b30;
    color:white;
}

.equal{
    background:#34c759;
    color:white;
}

.history{
    position: fixed;
    top: 20px;
    right: 20px;
    color: aliceblue;
    width: 300px;
    background: rgba(255,255,255,0.9);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
        background: rgba(34, 34, 34, 0.5);
    padding: 20px;
    border-radius: 15px;

}

.history h2{
    text-align:center;
    margin-bottom:15px;
}

#historyList{
    list-style:none;
}

#historyList li{
    padding:8px;
    border-bottom:1px solid #ddd;
    font-size:18px;
}

.clear-history{
    width:100%;
    margin-top:15px;
    padding:10px;
    background:red;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>
<h1 id="floatingText">Basic Calculator💡</h1>
<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        <button class="operator" onclick="appendValue('*')">×</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="number" onclick="appendValue('.')">.</button>

        <button class="number" onclick="appendValue('0')" style="grid-column:span 4;">
            0
        </button>
    </div>
</div>

<div class="history">
    <h2>Calculation History</h2>
    <ul id="historyList"></ul>
    <button class="clear-history" onclick="clearHistory()">
        Clear History
    </button>
</div>

<script>
const display = document.getElementById("display");
const historyList = document.getElementById("historyList");

let history = [];

function appendValue(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function calculate(){
    try{
        let expression = display.value;
        let result = eval(expression);

        let record = expression + " = " + result;

        history.unshift(record);

        if(history.length > 10){
            history.pop();
        }

        updateHistory();

        display.value = result;
    }
    catch{
        display.value = "Error";
    }
}

function updateHistory(){
    historyList.innerHTML = "";

    history.forEach(item => {
        let li = document.createElement("li");
        li.textContent = item;
        historyList.appendChild(li);
    });
}

function clearHistory(){
    history = [];
    updateHistory();
}
const text = document.getElementById("floatingText");

let position = 30;
let direction = 1;

setInterval(() => {
    position += direction * 0.2; // smaller movement = slower

    if (position >= 50) {
        direction = -1;
    }

    if (position <= 30) {
        direction = 1;
    }

    text.style.top = position + "px";
}, 30);
</script>

</body>
</html>
